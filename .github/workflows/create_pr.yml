name: Auto Create Pull Request

on:
  push:
    branches:
      - "*"
      - "!main" # Exclude main branch

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pull-request:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GHA_AUTO_PR_TOKEN }}
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          echo "Creating PR for branch: $BRANCH_NAME"

          # Check if PR already exists
          if gh pr list --head "$BRANCH_NAME" --json number --jq '.[0].number' | grep -q .; then
            echo "PR already exists for branch $BRANCH_NAME, skipping creation"
            exit 0
          fi

          gh pr create \
            --title "Soumission: $BRANCH_NAME" \
            --body "## ✅ Checklist avant soumission

          - [ ] Mon application compile sans erreurs
          - [ ] J'ai répondu aux 4 questions dans README.md
          - [ ] Le formatage Spotless passe localement
          - [ ] Mon projet est dans le dossier \`application/\`

          ---
          _PR créée automatiquement pour la branche \`$BRANCH_NAME\`_" \
            --base main \
            --head "$BRANCH_NAME"
